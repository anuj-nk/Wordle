services:
  - type: web
    name: definitely-not-wordle
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: wordle-sqlite
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        value: /var/data/wordle.sqlite
